name: Diagnose Flutter sanctity validation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-flutter-sanctity.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Capture diagnostics
        working-directory: mobile
        run: |
          flutter pub get > ../sanctity-flutter-pub.log 2>&1
          flutter analyze > ../sanctity-flutter-analyze.log 2>&1 || true
          flutter test > ../sanctity-flutter-test.log 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sanctity-flutter-*.log
          git commit -m "ci: record Flutter sanctity diagnostics"
          git push origin HEAD:main
