name: Install help page navigation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-help-page.yml'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, fileinfo, gd, sqlite3, pdo_sqlite
          coverage: none

      - name: Add routes and navigation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:160]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace(
              'routes/web.php',
              "Route::view('/terms', 'site.legal.terms')->name('terms');\n",
              "Route::view('/terms', 'site.legal.terms')->name('terms');\nRoute::view('/help', 'site.help')->name('help');\n",
          )

          replace(
              'routes/web.php',
              "        Route::get('/', AdminDashboardController::class)->name('dashboard');\n",
              "        Route::get('/', AdminDashboardController::class)->name('dashboard');\n        Route::redirect('/help', '/help?section=admin')->name('help');\n",
          )

          replace(
              'resources/views/site/layouts/app.blade.php',
              "                <div class=\"d-flex align-items-center gap-2\">\n                    @auth",
              "                <div class=\"d-flex align-items-center gap-2\">\n                    <a class=\"btn btn-light btn-sm\" href=\"{{ route('help') }}\" title=\"Помощь\"><i class=\"bi bi-question-circle\"></i></a>\n                    @auth",
          )

          replace(
              'resources/views/site/layouts/app.blade.php',
              "                                <li><a class=\"dropdown-item rounded-3\" href=\"{{ route('profile.dashboard') }}\"><i class=\"bi bi-grid me-2\"></i>Личный кабинет</a></li>\n",
              "                                <li><a class=\"dropdown-item rounded-3\" href=\"{{ route('profile.dashboard') }}\"><i class=\"bi bi-grid me-2\"></i>Личный кабинет</a></li>\n                                <li><a class=\"dropdown-item rounded-3\" href=\"{{ route('help') }}\"><i class=\"bi bi-question-circle me-2\"></i>Помощь</a></li>\n",
          )

          replace(
              'resources/views/site/layouts/app.blade.php',
              "<a class=\"footer-link\" href=\"{{ route('terms') }}\">Правила сервиса</a></span>",
              "<a class=\"footer-link\" href=\"{{ route('terms') }}\">Правила сервиса</a><a class=\"footer-link\" href=\"{{ route('help') }}\">Помощь</a></span>",
          )

          replace(
              'resources/views/admin/layouts/app.blade.php',
              "            <a class=\"sidebar-link {{ request()->routeIs('admin.dashboard') ? 'active' : '' }}\" href=\"{{ route('admin.dashboard') }}\"><i class=\"bi bi-grid-1x2\"></i><span>Обзор</span></a>\n",
              "            <a class=\"sidebar-link {{ request()->routeIs('admin.dashboard') ? 'active' : '' }}\" href=\"{{ route('admin.dashboard') }}\"><i class=\"bi bi-grid-1x2\"></i><span>Обзор</span></a>\n            <a class=\"sidebar-link\" href=\"{{ route('admin.help') }}\"><i class=\"bi bi-question-circle\"></i><span>Справка</span></a>\n",
          )
          PY

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Validate routes and Blade
        run: |
          php -l routes/web.php
          php artisan route:list --name=help
          php artisan view:clear
          php artisan view:cache
          php artisan test --filter=HelpPageTest

      - name: Commit navigation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add routes/web.php resources/views/site/layouts/app.blade.php resources/views/admin/layouts/app.blade.php
          git commit -m "feat(help): link guides from site and admin navigation"
          git push origin HEAD:main
