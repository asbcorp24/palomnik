          write('app/Http/Controllers/Site/EmailVerificationController.php', '''<?php

          namespace App\\Http\\Controllers\\Site;

          use App\\Http\\Controllers\\Controller;
          use App\\Models\\User;
          use Illuminate\\Auth\\Events\\Verified;
          use Illuminate\\Http\\RedirectResponse;
          use Illuminate\\Http\\Request;
          use Illuminate\\Support\\Facades\\Auth;
          use Illuminate\\View\\View;

          class EmailVerificationController extends Controller
          {
              public function notice(Request $request): View|RedirectResponse
              {
                  if ($request->user()->hasVerifiedEmail()) {
                      return redirect()->route('profile.dashboard');
                  }

                  return view('site.auth.verify-email');
              }

              public function verify(Request $request, int $id, string $hash): RedirectResponse
              {
                  $user = User::query()->findOrFail($id);

                  abort_unless(hash_equals(sha1($user->getEmailForVerification()), $hash), 403);

                  if (! $user->hasVerifiedEmail() && $user->markEmailAsVerified()) {
                      event(new Verified($user));
                  }

                  if (Auth::check() && Auth::id() === $user->id) {
                      return redirect()->route('profile.dashboard')
                          ->with('success', 'Email подтверждён. Все возможности личного кабинета доступны.');
                  }

                  return redirect()->route('login')
                      ->with('success', 'Email подтверждён. Теперь можно войти в аккаунт.');
              }

              public function resend(Request $request): RedirectResponse
              {
                  if ($request->user()->hasVerifiedEmail()) {
                      return redirect()->route('profile.dashboard');
                  }

                  $request->user()->sendEmailVerificationNotification();

                  return back()->with('success', 'Новое письмо с подтверждением отправлено.');
              }
          }
          '''.replace('          ', ''))

          write('app/Http/Controllers/Site/PasswordResetController.php', '''<?php

          namespace App\\Http\\Controllers\\Site;

          use App\\Http\\Controllers\\Controller;
          use Illuminate\\Auth\\Events\\PasswordReset;
          use Illuminate\\Http\\RedirectResponse;
          use Illuminate\\Http\\Request;
          use Illuminate\\Support\\Facades\\Hash;
          use Illuminate\\Support\\Facades\\Password;
          use Illuminate\\Support\\Str;
          use Illuminate\\Validation\\Rules\\Password as PasswordRule;
          use Illuminate\\View\\View;

          class PasswordResetController extends Controller
          {
              public function requestForm(): View
              {
                  return view('site.auth.forgot-password');
              }

              public function sendLink(Request $request): RedirectResponse
              {
                  $data = $request->validate(['email' => ['required', 'email']]);
                  Password::sendResetLink(['email' => mb_strtolower($data['email'])]);

                  return back()->with('success', 'Если такой email зарегистрирован, на него отправлена ссылка для восстановления пароля.');
              }

              public function resetForm(Request $request, string $token): View
              {
                  return view('site.auth.reset-password', [
                      'token' => $token,
                      'email' => $request->string('email')->toString(),
                  ]);
              }

              public function reset(Request $request): RedirectResponse
              {
                  $data = $request->validate([
                      'token' => ['required', 'string'],
                      'email' => ['required', 'email'],
                      'password' => ['required', 'confirmed', PasswordRule::min(8)],
                  ]);

                  $status = Password::reset(
                      [
                          'email' => mb_strtolower($data['email']),
                          'password' => $data['password'],
                          'password_confirmation' => $request->input('password_confirmation'),
                          'token' => $data['token'],
                      ],
                      function ($user, string $password) {
                          $user->forceFill([
                              'password' => Hash::make($password),
                          ])->setRememberToken(Str::random(60));
                          $user->save();
                          event(new PasswordReset($user));
                      }
                  );

                  if ($status !== Password::PASSWORD_RESET) {
                      return back()->withInput($request->only('email'))
                          ->withErrors(['email' => 'Ссылка недействительна или устарела. Запросите восстановление ещё раз.']);
                  }

                  return redirect()->route('login')->with('success', 'Пароль изменён. Войдите с новым паролем.');
              }
          }
