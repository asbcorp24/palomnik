name: Validate authentication flows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/validate-authentication.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, fileinfo, gd, sqlite3, pdo_sqlite, curl, json
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: |
          cp .env.example .env
          php artisan key:generate
          php artisan view:cache
          php artisan test --filter=AuthenticationFlowTest
      - run: |
          echo "authentication_validation=passed" > auth-validation.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auth-validation.txt
          git commit -m "ci: record authentication validation"
          git push origin HEAD:main
