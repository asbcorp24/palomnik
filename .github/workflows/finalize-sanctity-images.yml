name: Finalize sanctity images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-sanctity-images.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Finalize source
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old!r}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          replace(
              'database/seeders/DemoSeeder.php',
              "                array_merge($row, [\n                    'description' => 'Демонстрационное описание святыни для каталога и поиска.',\n                    'image_path' => $images[$row['image']],\n                ])",
              "                array_merge(array_diff_key($row, ['image' => true]), [\n                    'description' => 'Демонстрационное описание святыни для каталога и поиска.',\n                    'image_path' => $images[$row['image']],\n                ])",
          )

          replace(
              'database/migrations/2026_07_17_120000_add_image_path_to_sanctities_table.php',
              "        Schema::table('sanctities', function (Blueprint $table) {\n  $table->string('image_path')->nullable()->after('description');\n        });",
              "        Schema::table('sanctities', function (Blueprint $table) {\n            $table->string('image_path')->nullable()->after('description');\n        });",
          )
          replace(
              'database/migrations/2026_07_17_120000_add_image_path_to_sanctities_table.php',
              "        Schema::table('sanctities', function (Blueprint $table) {\n  $table->dropColumn('image_path');\n        });",
              "        Schema::table('sanctities', function (Blueprint $table) {\n            $table->dropColumn('image_path');\n        });",
          )

          p = Path('app/Http/Controllers/Api/V1/DirectoryController.php')
          text = p.read_text(encoding='utf-8').replace("            ]); \n", "            ]);\n")
          p.write_text(text, encoding='utf-8')
          PY

      - name: Validate PHP syntax
        run: |
          php -l database/seeders/DemoSeeder.php
          php -l database/migrations/2026_07_17_120000_add_image_path_to_sanctities_table.php
          php -l app/Http/Controllers/Api/V1/DirectoryController.php

      - name: Commit final fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database app
          git commit -m "fix(sanctities): finalize demo image data"
          git push origin HEAD:main
