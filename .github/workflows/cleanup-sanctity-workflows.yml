name: Cleanup temporary sanctity workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-sanctity-workflows.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove one-off workflows and diagnostics
        run: |
          rm -f \
            .github/workflows/add-sanctity-images.yml \
            .github/workflows/actions-probe.yml \
            .github/workflows/sanctity-precheck.yml \
            .github/workflows/sanctity-precheck-2.yml \
            .github/workflows/add-sanctity-images-v2.yml \
            .github/workflows/finalize-sanctity-images.yml \
            .github/workflows/validate-sanctity-images.yml \
            .github/workflows/diagnose-flutter-sanctity.yml \
            .github/workflows/fix-flutter-compilation.yml \
            .github/workflows/fix-flutter-compilation-v2.yml \
            .github/workflows/cleanup-sanctity-workflows.yml \
            actions-probe.txt \
            sanctity-precheck.txt \
            sanctity-precheck-2.txt \
            sanctity-validation.txt \
            sanctity-flutter-pub.log \
            sanctity-flutter-analyze.log \
            sanctity-flutter-test.log
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary sanctity workflows"
          git push origin HEAD:main
