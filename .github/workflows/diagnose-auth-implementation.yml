name: Diagnose authentication implementation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-auth-implementation.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, fileinfo, gd, sqlite3, pdo_sqlite, curl, json
          coverage: none

      - name: Re-run patch script and capture output
        id: patch
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/complete-auth-email-vk-captcha.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY", start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/auth-patch.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/auth-patch.py > auth-patch.log 2>&1

      - name: Capture dependency resolution
        id: composer
        continue-on-error: true
        run: composer update laravel/socialite socialiteproviders/manager movemoveapp/vkid --with-all-dependencies --no-interaction --prefer-dist --no-progress > auth-composer.log 2>&1

      - name: Capture syntax and tests
        id: tests
        continue-on-error: true
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate > auth-tests.log 2>&1 || true
          php -l routes/web.php >> auth-tests.log 2>&1 || true
          php artisan route:list --name=verification >> auth-tests.log 2>&1 || true
          php artisan view:cache >> auth-tests.log 2>&1 || true
          php artisan test --filter=AuthenticationFlowTest >> auth-tests.log 2>&1 || true

      - name: Record outcomes
        run: |
          cat > auth-workflow-outcomes.txt <<EOF
          patch=${{ steps.patch.outcome }}
          composer=${{ steps.composer.outcome }}
          tests=${{ steps.tests.outcome }}
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auth-patch.log auth-composer.log auth-tests.log auth-workflow-outcomes.txt
          git commit -m "ci: record authentication workflow diagnostics"
          git push origin HEAD:main
