name: Cleanup authentication workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-auth-workflows.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove temporary files
        run: |
          rm -f \
            .github/workflows/complete-auth-email-vk-captcha.yml \
            .github/workflows/complete-auth-email-vk-captcha-v2.yml \
            .github/workflows/diagnose-auth-implementation.yml \
            .github/workflows/cleanup-auth-workflows.yml \
            auth-patch.log \
            auth-composer.log \
            auth-tests.log \
            auth-workflow-outcomes.txt
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary authentication workflows"
          git push origin HEAD:main
