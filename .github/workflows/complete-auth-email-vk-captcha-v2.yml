name: Complete email and VK authentication v2

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/complete-auth-email-vk-captcha-v2.yml'

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, fileinfo, gd, sqlite3, pdo_sqlite, curl, json
          coverage: none

      - name: Apply authentication source changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/complete-auth-email-vk-captcha.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY", start)
          script = textwrap.dedent(source[start:end])
          exec(compile(script, 'auth-patch', 'exec'), {})
          PY

      - name: Adapt VK ID provider for Laravel 9
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          composer_path = Path('composer.json')
          composer = json.loads(composer_path.read_text(encoding='utf-8'))
          composer['require'].pop('movemoveapp/vkid', None)
          composer['require'].pop('socialiteproviders/manager', None)
          composer['require']['laravel/socialite'] = '^5.6'
          composer['require'] = dict(sorted(composer['require'].items()))
          composer_path.write_text(json.dumps(composer, ensure_ascii=False, indent=4) + '\n', encoding='utf-8')

          # The custom provider does not need SocialiteProviders Manager listeners.
          import subprocess
          subprocess.run(['git', 'checkout', '--', 'app/Providers/EventServiceProvider.php'], check=True)

          provider = '''<?php

          namespace App\\Services;

          use GuzzleHttp\\RequestOptions;
          use Illuminate\\Support\\Arr;
          use Laravel\\Socialite\\Two\\AbstractProvider;
          use Laravel\\Socialite\\Two\\User;
          use RuntimeException;

          class VkIdProvider extends AbstractProvider
          {
              protected $usesPKCE = true;

              protected $scopes = ['email'];

              protected function getAuthUrl($state)
              {
                  return $this->buildAuthUrlFromBase('https://id.vk.ru/authorize', $state);
              }

              protected function getTokenUrl()
              {
                  return 'https://id.vk.ru/oauth2/auth';
              }

              protected function getUserByToken($token)
              {
                  $response = $this->getHttpClient()->post('https://id.vk.ru/oauth2/user_info', [
                      RequestOptions::HEADERS => ['Accept' => 'application/json'],
                      RequestOptions::FORM_PARAMS => [
                          'access_token' => $token,
                          'client_id' => $this->clientId,
                      ],
                  ]);

                  $contents = (string) $response->getBody();
                  $payload = json_decode($contents, true);

                  if (! is_array($payload) || ! isset($payload['user']) || ! is_array($payload['user'])) {
                      throw new RuntimeException('VK ID returned an invalid user response.');
                  }

                  return $payload['user'];
              }

              protected function mapUserToObject(array $user)
              {
                  return (new User())->setRaw($user)->map([
                      'id' => Arr::get($user, 'user_id'),
                      'nickname' => null,
                      'name' => trim((string) Arr::get($user, 'first_name').' '.(string) Arr::get($user, 'last_name')),
                      'email' => Arr::get($user, 'email'),
                      'avatar' => Arr::get($user, 'avatar'),
                  ]);
              }

              protected function getTokenFields($code)
              {
                  return array_merge(parent::getTokenFields($code), [
                      'grant_type' => 'authorization_code',
                      'device_id' => $this->request->input('device_id'),
                  ]);
              }
          }
          '''.replace('          ', '')
          path = Path('app/Services/VkIdProvider.php')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(provider, encoding='utf-8')

          controller = '''<?php

          namespace App\\Http\\Controllers\\Site;

          use App\\Http\\Controllers\\Controller;
          use App\\Models\\FavoriteList;
          use App\\Models\\User;
          use App\\Services\\VkIdProvider;
          use Illuminate\\Http\\RedirectResponse;
          use Illuminate\\Http\\Request;
          use Illuminate\\Support\\Facades\\Auth;
          use Illuminate\\Support\\Facades\\DB;
          use Illuminate\\Support\\Facades\\Hash;
          use Illuminate\\Support\\Str;
          use Laravel\\Socialite\\Two\\InvalidStateException;
          use Throwable;

          class VkAuthController extends Controller
          {
              public function redirect(Request $request): RedirectResponse
              {
                  if (! $this->configured()) {
                      return redirect()->route('login')
                          ->with('error', 'Вход через VK пока не настроен администратором.');
                  }

                  return $this->provider($request)->redirect();
              }

              public function callback(Request $request): RedirectResponse
              {
                  if ($request->filled('error')) {
                      return redirect()->route('login')
                          ->with('error', 'Авторизация VK была отменена или завершилась ошибкой.');
                  }

                  if (! $this->configured()) {
                      return redirect()->route('login')
                          ->with('error', 'Вход через VK пока не настроен администратором.');
                  }

                  try {
                      $vkUser = $this->provider($request)->user();
                      $vkId = trim((string) $vkUser->getId());

                      if ($vkId === '') {
                          throw new \\RuntimeException('VK ID did not return user id.');
                      }

                      $email = mb_strtolower(trim((string) ($vkUser->getEmail() ?? '')));
                      if ($email !== '' && ! filter_var($email, FILTER_VALIDATE_EMAIL)) {
                          $email = '';
                      }

                      $name = trim((string) ($vkUser->getName() ?? '')) ?: 'Пользователь VK';
                      $avatar = trim((string) ($vkUser->getAvatar() ?? '')) ?: null;
                      $phone = trim((string) ($vkUser->user['phone'] ?? '')) ?: null;

                      $user = DB::transaction(function () use ($request, $vkId, $email, $name, $avatar, $phone) {
                          $user = User::query()->where('vk_id', $vkId)->first();

                          if (! $user && $email !== '') {
                              $user = User::query()->where('email', $email)->first();
                          }

                          if ($user && $user->vk_id && $user->vk_id !== $vkId) {
                              throw new \\RuntimeException('Email is already linked to another VK account.');
                          }

                          if (! $user) {
                              $localEmail = $email !== '' ? $email : 'vk_'.$vkId.'@users.palomnik.invalid';

                              $user = User::query()->create([
                                  'name' => $name,
                                  'email' => $localEmail,
                                  'email_verified_at' => now(),
                                  'phone' => $phone,
                                  'password' => Hash::make(Str::random(64)),
                                  'vk_id' => $vkId,
                                  'vk_avatar_url' => $avatar,
                                  'role' => User::ROLE_PILGRIM,
                                  'is_active' => true,
                                  'preferences' => [
                                      'notifications' => true,
                                      'privacy' => 'private',
                                      'theme' => 'system',
                                      'font_size' => 'normal',
                                      'interests' => [],
                                  ],
                              ]);

                              FavoriteList::query()->create([
                                  'user_id' => $user->id,
                                  'name' => 'Избранное',
                                  'is_default' => true,
                              ]);

                              $user->consents()->create([
                                  'type' => 'personal_data_processing',
                                  'policy_version' => config('palomnik.privacy.policy_version', '1.0'),
                                  'accepted_at' => now(),
                                  'ip_address' => $request->ip(),
                                  'user_agent' => mb_substr((string) $request->userAgent(), 0, 2000),
                              ]);
                          } else {
                              $updates = [
                                  'vk_id' => $vkId,
                                  'vk_avatar_url' => $avatar ?: $user->vk_avatar_url,
                              ];

                              if ($email !== '' && hash_equals(mb_strtolower($user->email), $email) && ! $user->email_verified_at) {
                                  $updates['email_verified_at'] = now();
                              }

                              if (! $user->phone && $phone) {
                                  $updates['phone'] = $phone;
                              }

                              $user->forceFill($updates)->save();
                          }

                          return $user->fresh();
                      });

                      if (! $user->is_active) {
                          return redirect()->route('login')->with('error', 'Учётная запись заблокирована.');
                      }

                      Auth::login($user, true);
                      $request->session()->regenerate();

                      return redirect()->intended(route('profile.dashboard'))
                          ->with('success', 'Вы вошли через VK ID.');
                  } catch (InvalidStateException $exception) {
                      return redirect()->route('login')
                          ->with('error', 'Сессия VK ID устарела. Повторите вход.');
                  } catch (Throwable $exception) {
                      report($exception);

                      return redirect()->route('login')
                          ->with('error', 'Не удалось войти через VK ID. Повторите попытку позднее.');
                  }
              }

              private function configured(): bool
              {
                  return filled(config('services.vkid.client_id'))
                      && filled(config('services.vkid.client_secret'))
                      && filled(config('services.vkid.redirect'));
              }

              private function provider(Request $request): VkIdProvider
              {
                  return (new VkIdProvider(
                      $request,
                      (string) config('services.vkid.client_id'),
                      (string) config('services.vkid.client_secret'),
                      (string) config('services.vkid.redirect'),
                      ['timeout' => 20, 'connect_timeout' => 10]
                  ))->setScopes(config('services.vkid.scopes', ['email']));
              }
          }
          '''.replace('          ', '')
          Path('app/Http/Controllers/Site/VkAuthController.php').write_text(controller, encoding='utf-8')
          PY

      - name: Install Laravel Socialite
        run: composer update laravel/socialite --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Validate PHP routes and Blade
        run: |
          php -l app/Services/VkIdProvider.php
          php -l app/Http/Controllers/Site/AuthController.php
          php -l app/Http/Controllers/Site/EmailVerificationController.php
          php -l app/Http/Controllers/Site/PasswordResetController.php
          php -l app/Http/Controllers/Site/VkAuthController.php
          php -l app/Models/User.php
          php -l config/services.php
          php -l routes/web.php
          php -l database/migrations/2026_07_22_120000_add_vk_fields_to_users_table.php
          php artisan route:list --name=verification
          php artisan route:list --name=auth.vk
          php artisan view:clear
          php artisan view:cache

      - name: Run authentication tests
        run: php artisan test --filter=AuthenticationFlowTest

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.json composer.lock app config database/migrations resources/views routes tests .env.example
          git commit -m "feat(auth): add email verification VK ID and registration captcha"
          git push origin HEAD:main
