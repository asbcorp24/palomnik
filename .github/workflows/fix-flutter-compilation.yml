name: Fix Flutter compilation blockers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-flutter-compilation.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch Flutter sources
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old!r}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          replace(
              'mobile/lib/src/screens/app_sections.dart',
              "              return const ListView(children: [SizedBox(height: 320), Center(child: CircularProgressIndicator())]);",
              "              return ListView(children: const [SizedBox(height: 320), Center(child: CircularProgressIndicator())]);",
          )

          path = Path('mobile/lib/src/screens/maplibre_map.dart')
          text = path.read_text(encoding='utf-8')
          text = text.replace("import 'package:geolocator/geolocator.dart';", "import 'package:geolocator/geolocator.dart' as geo;")
          text = text.replace('Future<Position> _position()', 'Future<geo.Position> _position()')
          text = text.replace('Geolocator.', 'geo.Geolocator.')
          text = text.replace('LocationPermission.', 'geo.LocationPermission.')
          text = text.replace('LocationAccuracy.', 'geo.LocationAccuracy.')
          path.write_text(text, encoding='utf-8')

          path = Path('mobile/lib/src/screens/enhanced_root_shell.dart')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "import 'content_features.dart';\nimport 'root_shell.dart';\nimport 'user_features.dart';",
              "import 'advanced_features.dart';\nimport 'app_sections.dart';\nimport 'content_features.dart';\nimport 'maplibre_map.dart';\nimport 'user_features.dart';",
          )
          text = text.replace('    const MapTab(),', '    const MapLibreMapTab(),')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate Flutter
        working-directory: mobile
        run: |
          flutter pub get
          flutter test
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile
          git commit -m "fix(mobile): resolve compilation blockers"
          git push origin HEAD:main
