name: Add sanctity images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-sanctity-images.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Add sanctity image support
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:120]!r}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          migration = Path('database/migrations/2026_07_17_120000_add_image_path_to_sanctities_table.php')
          migration.write_text('''<?php

          use Illuminate\\Database\\Migrations\\Migration;
          use Illuminate\\Database\\Schema\\Blueprint;
          use Illuminate\\Support\\Facades\\Schema;

          return new class extends Migration
          {
              public function up(): void
              {
                  Schema::table('sanctities', function (Blueprint $table) {
                      $table->string('image_path')->nullable()->after('description');
                  });
              }

              public function down(): void
              {
                  Schema::table('sanctities', function (Blueprint $table) {
                      $table->dropColumn('image_path');
                  });
              }
          };
          '''.replace('          ', ''), encoding='utf-8')

          replace('app/Models/Sanctity.php',
                  "use Illuminate\\Database\\Eloquent\\Relations\\BelongsToMany;\n",
                  "use Illuminate\\Database\\Eloquent\\Relations\\BelongsToMany;\nuse Illuminate\\Support\\Facades\\Storage;\nuse Illuminate\\Support\\Str;\n")
          replace('app/Models/Sanctity.php',
                  "        'description',\n    ];",
                  "        'description',\n        'image_path',\n    ];\n\n    protected $appends = [\n        'image_url',\n    ];")
          replace('app/Models/Sanctity.php',
                  "    public function pilgrimageObjects(): BelongsToMany\n",
                  "    public function getImageUrlAttribute(): ?string\n    {\n        if (! $this->image_path) {\n            return null;\n        }\n\n        if (Str::startsWith($this->image_path, ['http://', 'https://'])) {\n            return $this->image_path;\n        }\n\n        return Storage::disk('public')->url($this->image_path);\n    }\n\n    public function pilgrimageObjects(): BelongsToMany\n")

          replace('app/Http/Controllers/Admin/DirectoryController.php',
                  "use Illuminate\\Support\\Str;\n",
                  "use Illuminate\\Support\\Facades\\Storage;\nuse Illuminate\\Support\\Str;\n")
          replace('app/Http/Controllers/Admin/DirectoryController.php',
                  "        $data = $this->validated($request, $resource);\n        $data['slug'] = $this->makeUniqueSlug",
                  "        $data = $this->validated($request, $resource);\n        $data = $this->handleSanctityImage($request, $resource, $data);\n        $data['slug'] = $this->makeUniqueSlug")
          replace('app/Http/Controllers/Admin/DirectoryController.php',
                  "        $data = $this->validated($request, $resource, $item);\n        $data['slug'] = $this->makeUniqueSlug",
                  "        $data = $this->validated($request, $resource, $item);\n        $data = $this->handleSanctityImage($request, $resource, $data, $item);\n        $data['slug'] = $this->makeUniqueSlug")
          replace('app/Http/Controllers/Admin/DirectoryController.php',
                  "        $item->delete();\n\n        return redirect()",
                  "        if ($resource === 'sanctities' && $item->image_path) {\n            Storage::disk('public')->delete($item->image_path);\n        }\n\n        $item->delete();\n\n        return redirect()")
          replace('app/Http/Controllers/Admin/DirectoryController.php',
                  "        if ($resource === 'sanctities') {\n            $rules['type'] = ['nullable', 'string', 'max:64'];\n        }",
                  "        if ($resource === 'sanctities') {\n            $rules['type'] = ['nullable', 'string', 'max:64'];\n            $rules['image'] = ['nullable', 'image', 'mimes:jpg,jpeg,png,webp', 'max:5120'];\n            $rules['remove_image'] = ['nullable', 'boolean'];\n        }")
          replace('app/Http/Controllers/Admin/DirectoryController.php',
                  "    private function makeUniqueSlug(",
                  "    private function handleSanctityImage(Request $request, string $resource, array $data, ?Model $item = null): array\n    {\n        if ($resource !== 'sanctities') {\n            return $data;\n        }\n\n        unset($data['image'], $data['remove_image']);\n\n        if ($request->boolean('remove_image') && $item?->image_path) {\n            Storage::disk('public')->delete($item->image_path);\n            $data['image_path'] = null;\n        }\n\n        if ($request->hasFile('image')) {\n            if ($item?->image_path) {\n                Storage::disk('public')->delete($item->image_path);\n            }\n            $data['image_path'] = $request->file('image')->store('sanctities', 'public');\n        }\n\n        return $data;\n    }\n\n    private function makeUniqueSlug(")

          replace('resources/views/admin/directories/form.blade.php',
                  '<form method="POST" action="{{ $item->exists ? route(\'admin.directories.update\', [$resource, $item->id]) : route(\'admin.directories.store\', $resource) }}">',
                  '<form method="POST" enctype="multipart/form-data" action="{{ $item->exists ? route(\'admin.directories.update\', [$resource, $item->id]) : route(\'admin.directories.store\', $resource) }}">')
          replace('resources/views/admin/directories/form.blade.php',
                  "                <div class=\"col-lg-6\">\n                    <label class=\"form-label\" for=\"type\">Тип святыни</label>\n                    <input class=\"form-control\" id=\"type\" name=\"type\" value=\"{{ old('type', $item->type) }}\" maxlength=\"64\" placeholder=\"икона, мощи, источник...\">\n                </div>",
                  "                <div class=\"col-lg-6\">\n                    <label class=\"form-label\" for=\"type\">Тип святыни</label>\n                    <input class=\"form-control\" id=\"type\" name=\"type\" value=\"{{ old('type', $item->type) }}\" maxlength=\"64\" placeholder=\"икона, мощи, источник...\">\n                </div>\n                <div class=\"col-lg-6\">\n                    <label class=\"form-label\" for=\"image\">Фотография святыни</label>\n                    <input class=\"form-control\" id=\"image\" type=\"file\" name=\"image\" accept=\"image/jpeg,image/png,image/webp\">\n                    <div class=\"form-text\">JPG, PNG или WebP, до 5 МБ.</div>\n                </div>\n                @if($item->image_url)\n                    <div class=\"col-12\">\n                        <img src=\"{{ $item->image_url }}\" alt=\"{{ $item->name }}\" class=\"rounded-4 border\" style=\"width:240px;height:160px;object-fit:cover\">\n                        <div class=\"form-check mt-2\">\n                            <input class=\"form-check-input\" id=\"remove_image\" type=\"checkbox\" name=\"remove_image\" value=\"1\">\n                            <label class=\"form-check-label\" for=\"remove_image\">Удалить текущую фотографию</label>\n                        </div>\n                    </div>\n                @endif")

          replace('resources/views/admin/directories/index.blade.php',
                  "                    @if($resource === 'sanctities')\n                        <th>Тип святыни</th>\n                    @endif",
                  "                    @if($resource === 'sanctities')\n                        <th style=\"width:92px\">Фото</th>\n                        <th>Тип святыни</th>\n                    @endif")
          replace('resources/views/admin/directories/index.blade.php',
                  "                        @if($resource === 'sanctities')\n                            <td>{{ $item->type ?: '—' }}</td>\n                        @endif",
                  "                        @if($resource === 'sanctities')\n                            <td>@if($item->image_url)<img src=\"{{ $item->image_url }}\" alt=\"\" class=\"rounded-3 border\" style=\"width:64px;height:48px;object-fit:cover\">@else<span class=\"text-secondary\">—</span>@endif</td>\n                            <td>{{ $item->type ?: '—' }}</td>\n                        @endif")

          replace('app/Http/Controllers/Api/V1/DirectoryController.php',
                  "            ->limit(100)\n            ->get(['id', 'name', 'slug', 'type']);",
                  "            ->limit(100)\n            ->get(['id', 'name', 'slug', 'type', 'description', 'image_path'])\n            ->map(fn (Sanctity $sanctity) => [\n                'id' => $sanctity->id,\n                'name' => $sanctity->name,\n                'slug' => $sanctity->slug,\n                'type' => $sanctity->type,\n                'description' => $sanctity->description,\n                'image_url' => $sanctity->image_url,\n            ]); ")
          replace('app/Http/Resources/PilgrimageObjectResource.php',
                  "                        'type' => $sanctity->type,\n                        'note' => $sanctity->pivot->note,",
                  "                        'type' => $sanctity->type,\n                        'description' => $sanctity->description,\n                        'image_url' => $sanctity->image_url,\n                        'note' => $sanctity->pivot->note,")

          old_sanctity_line = "                    <section class=\"mb-5\"><div class=\"section-kicker mb-2\">Главное</div><h2 class=\"h2 mb-4\">Святыни</h2><div class=\"row g-3\">@foreach($object->sanctities as $sanctity)<div class=\"col-md-6\"><div class=\"info-card h-100 d-flex gap-3\"><span class=\"info-icon flex-shrink-0\"><i class=\"bi bi-star\"></i></span><div><h3 class=\"h6 mb-2\">{{ $sanctity->name }}</h3>@if($sanctity->pivot->note)<div class=\"small text-secondary\">{{ $sanctity->pivot->note }}</div>@endif</div></div></div>@endforeach</div></section>"
          new_sanctity_line = "                    <section class=\"mb-5\"><div class=\"section-kicker mb-2\">Главное</div><h2 class=\"h2 mb-4\">Святыни</h2><div class=\"row g-3\">@foreach($object->sanctities as $sanctity)<div class=\"col-md-6\"><div class=\"info-card h-100 overflow-hidden p-0\">@if($sanctity->image_url)<img src=\"{{ $sanctity->image_url }}\" alt=\"{{ $sanctity->name }}\" class=\"w-100 offline-asset\" style=\"height:190px;object-fit:cover\" loading=\"lazy\">@endif<div class=\"p-4 d-flex gap-3\"><span class=\"info-icon flex-shrink-0\"><i class=\"bi bi-star\"></i></span><div><h3 class=\"h6 mb-2\">{{ $sanctity->name }}</h3>@if($sanctity->description)<div class=\"small text-secondary mb-2\">{{ $sanctity->description }}</div>@endif@if($sanctity->pivot->note)<div class=\"small text-secondary\">{{ $sanctity->pivot->note }}</div>@endif</div></div></div></div>@endforeach</div></section>"
          replace('resources/views/site/objects/show.blade.php', old_sanctity_line, new_sanctity_line)

          replace('database/seeders/DemoSeeder.php',
                  "            [$vicariates, $deaneries, $sanctities] = $this->seedDirectories();\n            $images = $this->seedImages();",
                  "            $images = $this->seedImages();\n            [$vicariates, $deaneries, $sanctities] = $this->seedDirectories($images);")
          replace('database/seeders/DemoSeeder.php',
                  "    private function seedDirectories(): array",
                  "    private function seedDirectories(array $images): array")
          replace('database/seeders/DemoSeeder.php',
                  "            'iveron-icon' => ['name' => 'Иверская икона Божией Матери', 'slug' => 'iveron-icon', 'type' => 'icon'],\n            'kazan-icon' => ['name' => 'Казанская икона Божией Матери', 'slug' => 'kazan-icon', 'type' => 'icon'],\n            'relics-sergius' => ['name' => 'Святыни, связанные с преподобным Сергием Радонежским', 'slug' => 'relics-sergius', 'type' => 'relics'],\n            'relics-alexy' => ['name' => 'Святыни, связанные со святителем Алексием', 'slug' => 'relics-alexy', 'type' => 'relics'],\n            'life-giving-cross' => ['name' => 'Крест и распятие', 'slug' => 'life-giving-cross', 'type' => 'relic'],\n            'holy-spring' => ['name' => 'Святой источник', 'slug' => 'holy-spring', 'type' => 'spring'],",
                  "            'iveron-icon' => ['name' => 'Иверская икона Божией Матери', 'slug' => 'iveron-icon', 'type' => 'icon', 'image' => 'sanctity-iveron'],\n            'kazan-icon' => ['name' => 'Казанская икона Божией Матери', 'slug' => 'kazan-icon', 'type' => 'icon', 'image' => 'sanctity-kazan'],\n            'relics-sergius' => ['name' => 'Святыни, связанные с преподобным Сергием Радонежским', 'slug' => 'relics-sergius', 'type' => 'relics', 'image' => 'sanctity-sergius'],\n            'relics-alexy' => ['name' => 'Святыни, связанные со святителем Алексием', 'slug' => 'relics-alexy', 'type' => 'relics', 'image' => 'sanctity-alexy'],\n            'life-giving-cross' => ['name' => 'Крест и распятие', 'slug' => 'life-giving-cross', 'type' => 'relic', 'image' => 'sanctity-cross'],\n            'holy-spring' => ['name' => 'Святой источник', 'slug' => 'holy-spring', 'type' => 'spring', 'image' => 'sanctity-spring'],")
          replace('database/seeders/DemoSeeder.php',
                  "                array_merge($row, ['description' => 'Демонстрационное описание святыни для каталога и поиска.'])",
                  "                array_merge($row, [\n                    'description' => 'Демонстрационное описание святыни для каталога и поиска.',\n                    'image_path' => $images[$row['image']],\n                ])")
          replace('database/seeders/DemoSeeder.php',
                  "            'community-two' => ['demo/community-two.svg', 'Семейное паломничество', 'Полезные советы', '#6a4d3c', '#d5b66e'],",
                  "            'community-two' => ['demo/community-two.svg', 'Семейное паломничество', 'Полезные советы', '#6a4d3c', '#d5b66e'],\n            'sanctity-iveron' => ['demo/sanctity-iveron.svg', 'Иверская икона', 'Святыня', '#4e382d', '#c49a53'],\n            'sanctity-kazan' => ['demo/sanctity-kazan.svg', 'Казанская икона', 'Святыня', '#65402f', '#d2aa63'],\n            'sanctity-sergius' => ['demo/sanctity-sergius.svg', 'Преподобный Сергий', 'Святые мощи', '#294d43', '#c4a45f'],\n            'sanctity-alexy' => ['demo/sanctity-alexy.svg', 'Святитель Алексий', 'Святые мощи', '#354a64', '#c8a75b'],\n            'sanctity-cross' => ['demo/sanctity-cross.svg', 'Животворящий Крест', 'Святыня', '#53352f', '#b88d4d'],\n            'sanctity-spring' => ['demo/sanctity-spring.svg', 'Святой источник', 'Талеж', '#246173', '#8dc4ce'],")

          old_flutter = """                      if (sanctities.isNotEmpty) ...[
                        const FeatureHeading('Святыни'),
                        Wrap(
                          spacing: 8,
                          runSpacing: 8,
                          children: sanctities.map((value) {
                            final data = _map(value);
                            return Chip(label: Text('${data['name'] ?? ''}'));
                          }).toList(),
                        ),
                      ],"""
          new_flutter = """                      if (sanctities.isNotEmpty) ...[
                        const FeatureHeading('Святыни'),
                        ...sanctities.map((value) {
                          final data = _map(value);
                          final imageUrl = data['image_url'];
                          return Card(
                            clipBehavior: Clip.antiAlias,
                            margin: const EdgeInsets.only(bottom: 12),
                            child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                              if (imageUrl != null)
                                Image.network('$imageUrl', height: 180, width: double.infinity, fit: BoxFit.cover, errorBuilder: (_, __, ___) => const SizedBox.shrink()),
                              Padding(
                                padding: const EdgeInsets.all(16),
                                child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                                  Text('${data['name'] ?? ''}', style: Theme.of(context).textTheme.titleMedium?.copyWith(fontWeight: FontWeight.w700)),
                                  if (_text(data['description']) != null) ...[const SizedBox(height: 6), Text('${data['description']}', style: const TextStyle(color: Colors.black54))],
                                  if (_text(data['note']) != null) ...[const SizedBox(height: 6), Text('${data['note']}', style: const TextStyle(color: Colors.black54))],
                                ]),
                              ),
                            ]),
                          );
                        }),
                      ],"""
          replace('mobile/lib/src/screens/user_features.dart', old_flutter, new_flutter)

          test = Path('tests/Feature/Api/SanctityImageTest.php')
          test.write_text('''<?php

          namespace Tests\\Feature\\Api;

          use Database\\Seeders\\DemoSeeder;
          use Illuminate\\Foundation\\Testing\\RefreshDatabase;
          use Tests\\TestCase;

          class SanctityImageTest extends TestCase
          {
              use RefreshDatabase;

              public function test_demo_sanctities_have_images_in_directory_and_object_api(): void
              {
                  $this->seed(DemoSeeder::class);

                  $directory = $this->getJson('/api/v1/directories/sanctities');
                  $directory->assertOk()->assertJsonPath('data.0.image_url', fn ($value) => is_string($value) && str_contains($value, '/storage/demo/'));

                  $object = $this->getJson('/api/v1/objects/christ-saviour-cathedral');
                  $object->assertOk()->assertJsonPath('data.sanctities.0.image_url', fn ($value) => is_string($value) && str_contains($value, '/storage/demo/'));
              }
          }
          '''.replace('          ', ''), encoding='utf-8')
          PY

      - name: Validate PHP syntax
        run: |
          php -l app/Models/Sanctity.php
          php -l app/Http/Controllers/Admin/DirectoryController.php
          php -l app/Http/Controllers/Api/V1/DirectoryController.php
          php -l app/Http/Resources/PilgrimageObjectResource.php
          php -l database/seeders/DemoSeeder.php
          php -l database/migrations/2026_07_17_120000_add_image_path_to_sanctities_table.php
          php -l tests/Feature/Api/SanctityImageTest.php

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app database resources mobile tests
          git commit -m "feat(sanctities): add photos across web API admin and mobile"
          git push origin HEAD:main
