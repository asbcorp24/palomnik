name: Complete email and VK authentication

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/complete-auth-email-vk-captcha.yml'

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, fileinfo, gd, sqlite3, pdo_sqlite, curl, json
          coverage: none

      - name: Implement authentication flows
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content, encoding='utf-8')

          def replace(path, old, new, count=1):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:180]!r}')
              p.write_text(text.replace(old, new, count), encoding='utf-8')

          composer_path = Path('composer.json')
          composer = json.loads(composer_path.read_text(encoding='utf-8'))
          composer['require']['laravel/socialite'] = '^5.6'
          composer['require']['socialiteproviders/manager'] = '^4.4'
          composer['require']['movemoveapp/vkid'] = '^1.0'
          composer['require'] = dict(sorted(composer['require'].items()))
          composer_path.write_text(json.dumps(composer, ensure_ascii=False, indent=4) + '\n', encoding='utf-8')

