name: Sanctity image patch precheck

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sanctity-precheck.yml'

permissions:
  contents: write

jobs:
  precheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Check source patterns
        run: |
          python - <<'PY'
          from pathlib import Path

          checks = [
              ('app/Models/Sanctity.php', "use Illuminate\\Database\\Eloquent\\Relations\\BelongsToMany;\n"),
              ('app/Models/Sanctity.php', "        'description',\n    ];"),
              ('app/Http/Controllers/Admin/DirectoryController.php', "        $data = $this->validated($request, $resource);\n        $data['slug'] = $this->makeUniqueSlug"),
              ('app/Http/Controllers/Admin/DirectoryController.php', "        $data = $this->validated($request, $resource, $item);\n        $data['slug'] = $this->makeUniqueSlug"),
              ('resources/views/admin/directories/form.blade.php', '<form method="POST" action="{{ $item->exists ? route(\'admin.directories.update\', [$resource, $item->id]) : route(\'admin.directories.store\', $resource) }}">'),
              ('app/Http/Controllers/Api/V1/DirectoryController.php', "            ->limit(100)\n            ->get(['id', 'name', 'slug', 'type']);"),
              ('app/Http/Resources/PilgrimageObjectResource.php', "                        'type' => $sanctity->type,\n                        'note' => $sanctity->pivot->note,"),
              ('database/seeders/DemoSeeder.php', "            [$vicariates, $deaneries, $sanctities] = $this->seedDirectories();\n            $images = $this->seedImages();"),
              ('database/seeders/DemoSeeder.php', "    private function seedDirectories(): array"),
              ('database/seeders/DemoSeeder.php', "                array_merge($row, ['description' => 'Демонстрационное описание святыни для каталога и поиска.'])"),
              ('mobile/lib/src/screens/user_features.dart', "return Chip(label: Text('${data['name'] ?? ''}'));"),
          ]

          lines = []
          for path, pattern in checks:
              text = Path(path).read_text(encoding='utf-8')
              lines.append(f"{'OK' if pattern in text else 'MISSING'} | {path} | {pattern[:100]!r}")

          Path('sanctity-precheck.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Commit precheck result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sanctity-precheck.txt
          git commit -m "ci: record sanctity patch precheck"
          git push origin HEAD:main
