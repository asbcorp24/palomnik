name: Fix demo seeder PHP 8.0

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-demo-seeder-php80.yml'

permissions:
  contents: write

jobs:
  patch-demo-seeder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Replace PHP 8.1 string-key array unpacking
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('database/seeders/DemoSeeder.php')
          text = path.read_text(encoding='utf-8')

          replacements = {
              "[...$commonPreferences, 'interests' => ['routes', 'community', 'youth']]": "array_merge($commonPreferences, ['interests' => ['routes', 'community', 'youth']])",
              "[...$commonPreferences, 'privacy' => 'friends']": "array_merge($commonPreferences, ['privacy' => 'friends'])",
              "[...$row, 'description' => 'Демонстрационное описание святыни для каталога и поиска.']": "array_merge($row, ['description' => 'Демонстрационное описание святыни для каталога и поиска.'])",
              "[...$row, 'is_published' => true, 'published_at' => now()->subDay()]": "array_merge($row, ['is_published' => true, 'published_at' => now()->subDay()])",
          }

          missing = [old for old in replacements if old not in text]
          if missing:
              raise SystemExit(f'Expected patterns not found: {missing}')

          for old, new in replacements.items():
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate PHP syntax
        run: php -l database/seeders/DemoSeeder.php

      - name: Commit compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/seeders/DemoSeeder.php
          git commit -m "fix(seed): support DemoSeeder on PHP 8.0"
          git push origin HEAD:main
